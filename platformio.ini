[env:disco_b_g431b_esc1]
platform = ststm32
board = disco_b_g431b_esc1
framework = arduino
upload_protocol = stlink
debug_tool = stlink
monitor_speed = 115200
; Match the ST-Link's VCP by USB VID:PID so it survives ttyACM# shuffles.
; On this machine that's /dev/ttyACM0; the hwgrep keeps it pinned even if
; the ESP32 (also plugged in) renumbers things.
monitor_port = hwgrep://0483:374B
lib_archive = no
build_flags =
  -D HAL_OPAMP_MODULE_ENABLED
lib_deps =
  askuric/Simple FOC@^2.3.4
